ass="hljs-keyword">for</span>(<span class="hljs-keyword">const</span> path <span class="hljs-keyword">in</span> modulesFiles)&#123;<br>  modulesFiles[path]().then(<span class="hljs-function">(<span class="hljs-params">mod</span>) =&gt;</span> &#123;<br>    modules[path.replace(<span class="hljs-regexp">/(\.\/modules\/|\.js)/g</span>, <span class="hljs-string">&#x27;&#x27;</span>)] = mod.default<br>  &#125;)<br>&#125;<br><br></code></pre></td></tr></table></figure>
